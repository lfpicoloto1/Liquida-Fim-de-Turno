# Front com contexto na RAIZ do repo (Dockerfile = docker/front/Dockerfile).
# Se o serviço usa Root Directory = "front", usa antes `front/railway.toml` (ou Config as Code → `/front/railway.toml`).
[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/front/Dockerfile"

[deploy]
# Schema no Postgres antes de servir tráfego (DATABASE_URL no serviço, ex. referência ao plugin Postgres).
preDeployCommand = "npm run db:push:deploy"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
